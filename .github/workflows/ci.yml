name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build packages
      run: npm run build:packages

    - name: Run typecheck
      run: npm run typecheck:packages

    - name: Run tests
      run: npm run test:packages

  flutter:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - name: Sync Flutter data assets
      run: node scripts/sync-package-data.cjs

    - name: Install Flutter dependencies
      working-directory: packages/imanikurd_flutter
      run: flutter pub get

    - name: Analyze Flutter package
      working-directory: packages/imanikurd_flutter
      run: dart analyze

    - name: Test Flutter package
      working-directory: packages/imanikurd_flutter
      run: flutter test
