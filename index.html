  <style>
    /* Critical CSS for initial load */
    body {
      margin: 0;
      font-family: 'Noto Sans Arabic', sans-serif;
      background: linear-gradient(135deg, #0a2618 0%, #0d3320 50%, #0a2618 100%);
      min-height: 100vh;
      direction: rtl;
    }

    #root {
      min-height: 100vh;
    }

    /* Instant loading screen - shows before React loads */
    .initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a2618 0%, #0d3320 50%, #0a2618 100%);
      z-index: 9999;
    }

    .initial-loader .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(22, 101, 52, 0.3);
      border-top-color: #166534;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .initial-loader .app-name {
      margin-top: 16px;
      color: rgba(22, 101, 52, 0.7);
      font-size: 14px;
      font-family: 'Noto Sans Arabic', sans-serif;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    /* Hide initial loader when React is ready */
    .app-ready .initial-loader {
      display: none;
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Instant loading screen shown before React hydrates -->
    <div class="initial-loader">
      <div class="spinner"></div>
      <p class="app-name">ئیمان</p>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
