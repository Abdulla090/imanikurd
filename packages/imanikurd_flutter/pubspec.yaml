name: imanikurd
description: Complete Islamic toolkit for the Kurdish community — Quran, 13 Kurdish Tafsirs, Qibla, prayer times, dhikr, hadith, and more.
version: 1.1.1
homepage: https://github.com/Abdulla090/imanikurd
repository: https://github.com/Abdulla090/imanikurd
issue_tracker: https://github.com/Abdulla090/imanikurd/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0

dev_dependencies:
  flutter_lints: ^5.0.0
  test: ^1.25.0

flutter:
  assets:
    - assets/data/

topics:
  - islam
  - quran
  - kurdish
  - prayer-times
  - qibla
